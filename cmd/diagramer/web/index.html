<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>diagramer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="toolbar">
    <span class="title">diagramer</span>
    <button id="add-box">+ Box</button>
    <button id="connect-mode">Connect</button>
    <button id="delete" disabled>Delete</button>
    <span id="status" class="status"></span>
  </header>
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"></path>
      </marker>
      <marker id="arrow-selected" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"></path>
      </marker>
    </defs>
    <g id="edges"></g>
    <g id="nodes"></g>
  </svg>
  <script src="/app.js"></script>
</body>
</html>
