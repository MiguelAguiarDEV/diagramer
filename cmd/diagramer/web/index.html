<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>diagramer</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    // Set the theme before first paint to avoid a flash of the wrong palette.
    (function () {
      try {
        var t = localStorage.getItem("diagramer-theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-head">
      <span class="brand">diagramer</span>
      <button id="new-diagram" title="New diagram">+</button>
    </div>
    <ul id="diagram-list"></ul>
  </aside>
  <main>
    <header class="toolbar">
      <button id="nav-back" class="nav-btn" title="Back (Alt+←)" disabled>‹</button>
      <button id="nav-fwd" class="nav-btn" title="Forward (Alt+→)" disabled>›</button>
      <span id="diagram-name" class="title">Untitled</span>
      <button id="add-box">+ Add</button>
      <button id="tidy">Tidy</button>
      <button id="connect-mode">Connect</button>
      <button id="delete" disabled>Delete</button>
      <button id="fit-view" title="Fit everything in view (F)">Fit</button>
      <button id="import">Import</button>
      <button id="export">Export</button>
      <span id="status" class="status"></span>
      <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
    </header>
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
        <marker id="arrow-selected" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
      </defs>
      <g id="viewport">
        <g id="edges"></g>
        <g id="nodes"></g>
        <g id="edge-labels"></g>
      </g>
    </svg>
    <svg id="minimap" xmlns="http://www.w3.org/2000/svg" aria-label="Minimap">
      <g id="minimap-content"></g>
      <rect id="minimap-vp"></rect>
    </svg>
  </main>
  <input id="node-editor" type="text" hidden>
  <div id="ctx-menu" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
