version: 2

# diagramer is a single static binary: one main package, no cgo, embedded
# frontend via go:embed. The release pipeline mirrors that simplicity.

project_name: diagramer

before:
  hooks:
    - go mod tidy

builds:
  - id: diagramer
    main: ./cmd/diagramer
    binary: diagramer
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      # Windows on ARM is niche enough to skip until someone asks.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CLAUDE.md
      - docs/**/*

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*(feat|add)[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 99
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ---
    **Full Changelog**: https://github.com/MiguelAguiarDEV/diagramer/compare/{{ .PreviousTag }}...{{ .Tag }}
